artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/Abdullah963039/datasets-reference/raw/refs/heads/master/custom_dataset.zip
  local_data_file: artifacts/data_ingestion/dataset.zip
  unzip_dir: artifacts/data_ingestion

data_preparation:
  root_dir: artifacts/data_preparation
  data_path: artifacts/data_ingestion/custom_dataset
  train_path: artifacts/data_ingestion/custom_dataset/MTS-Dialog-TrainingSet.csv
  validation_path: artifacts/data_ingestion/custom_dataset/MTS-Dialog-ValidationSet.csv
  test_paths: ["artifacts/data_ingestion/custom_dataset/MTS-Dialog-TestSet-1-MEDIQA-Chat-2023.csv", "artifacts/data_ingestion/custom_dataset/MTS-Dialog-TestSet-2-MEDIQA-Sum-2023.csv"]

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  ALL_REQUIRED_FILES: ["train", "test", "validation"]


data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_preparation
  save_dataset_dir: dataset
  tokenizer_name: google/pegasus-large
  tokenizer_truncation: True
  tokenizer_padding: max_length
  tokenizer_input_max_length: 512
  tokenizer_target_max_length: 128


model_trainer:
  root_dir: artifacts/model_trainer
  data_path: artifacts/data_transformation/dataset
  model_ckpt: google/pegasus-pubmed
  save_model: pegasus-model
  save_tokenizer: tokenizer


model_evaluation:
  root_dir: artifacts/model_evaluation
  data_path: artifacts/data_transformation/dataset
  model_path: artifacts/model_trainer/pegasus-model
  tokenizer_path: artifacts/model_trainer/tokenizer
  metric_file_name: artifacts/model_evaluation/metrics.csv